server:
  port: 8080

spring:
  application:
    name: ea-tool-backend
  web:
    resources:
      # Serves the existing frontend static files (src/index.html, app.js, ...)
      # from the same origin as the API, so the browser needs no CORS setup.
      # ${user.dir} is the JVM working directory; the documented workflow runs
      # the backend from backend/, so this resolves to the repository's
      # top-level src/ directory.
      static-locations: "file:${user.dir}/../src/"
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID:ea-tool-backend}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:ea-tool-backend-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid, profile, email
        provider:
          keycloak:
            # Points at the dev realm imported by docker-compose (docker/keycloak/ea-tool-realm.json).
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/ea-tool}
  datasource:
    # Matches the PostgreSQL service provisioned by docker-compose.yml.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ea_tool}
    username: ${DB_USERNAME:ea_tool}
    password: ${DB_PASSWORD:ea_tool}
  jpa:
    hibernate:
      # Dev-friendly auto-migration; revisit with Flyway/Liquibase before production use.
      ddl-auto: update
    open-in-view: false
  # Local Login invite emails (issue #9). Leave unset in dev — the invite link
  # is logged instead (LoggingInvitationMailer). To send real emails, configure
  # a corporate SMTP relay, e.g.:
  # mail:
  #   host: ${SMTP_HOST}
  #   port: ${SMTP_PORT:587}
  #   username: ${SMTP_USERNAME:}
  #   password: ${SMTP_PASSWORD:}
  #   properties:
  #     mail.smtp.auth: true
  #     mail.smtp.starttls.enable: true

app:
  # Base URL the browser uses; also where login/logout redirect back to and the
  # host used to build Local Login invite links (issue #9).
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:8080}
  # Emails provisioned as Admin (instead of the default Viewer) on first SSO
  # login. Configurable without code changes via application.yml or the
  # SEED_ADMIN_EMAILS environment variable (comma-separated list).
  seed-admins: ${SEED_ADMIN_EMAILS:admin.demo@example.com}
  local-login:
    # From address for the Local Login invite email (issue #9). Only used when
    # a real SMTP relay is configured (spring.mail.host below); otherwise the
    # invite link is logged in dev.
    mail-from: ${LOCAL_LOGIN_MAIL_FROM:no-reply@ea-tool.local}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
