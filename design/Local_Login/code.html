<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Strategic Ledger | Enterprise Authentication</title>
<!-- Inter Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary-fixed": "#001e2f",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#e3c28a",
                        "tertiary": "#211500",
                        "surface-dim": "#dbd9dc",
                        "surface-container": "#efedf0",
                        "secondary-fixed-dim": "#89ceff",
                        "outline-variant": "#c5c6ce",
                        "background": "#fbf8fb",
                        "error-container": "#ffdad6",
                        "outline": "#75777e",
                        "secondary-fixed": "#c9e6ff",
                        "primary-fixed-dim": "#b7c7eb",
                        "on-tertiary-fixed-variant": "#594317",
                        "inverse-on-surface": "#f2f0f3",
                        "on-surface": "#1b1b1e",
                        "secondary": "#006591",
                        "on-secondary-fixed-variant": "#004c6e",
                        "surface-tint": "#4f5e7e",
                        "on-tertiary": "#ffffff",
                        "primary": "#041632",
                        "on-tertiary-container": "#ac8e5b",
                        "on-background": "#1b1b1e",
                        "primary-fixed": "#d7e2ff",
                        "on-tertiary-fixed": "#271900",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#004666",
                        "primary-container": "#1b2b48",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#eae7ea",
                        "secondary-container": "#39b8fd",
                        "on-primary-fixed-variant": "#374765",
                        "surface": "#fbf8fb",
                        "surface-container-highest": "#e4e2e5",
                        "on-primary-fixed": "#091b37",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#ffdea7",
                        "on-surface-variant": "#44474d",
                        "on-primary-container": "#8393b5",
                        "inverse-surface": "#303033",
                        "surface-bright": "#fbf8fb",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#3b2800",
                        "inverse-primary": "#b7c7eb",
                        "surface-container-low": "#f5f3f6",
                        "surface-variant": "#e4e2e5"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "display": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC; /* Specified background */
        }
        .high-density-shadow {
            box-shadow: 0px 1px 2px rgba(0, 0, 0, 0.05), 0px 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
<!-- Auth Card -->
<main class="w-full max-w-[400px] bg-white border border-outline-variant rounded-xl high-density-shadow overflow-hidden">
<!-- Header Section -->
<header class="bg-primary px-8 py-10 text-center relative overflow-hidden">
<!-- Subtle Mesh Background -->
<div class="absolute inset-0 opacity-10 pointer-events-none">

</div>
<div class="relative z-10">
<div class="inline-flex items-center justify-center w-12 h-12 bg-on-primary-container/20 rounded-lg mb-4">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">account_tree</span>
</div>
<h1 class="text-white text-2xl font-bold tracking-tight mb-1">Strategic Ledger</h1>
<p class="text-on-primary-container text-xs font-medium uppercase tracking-widest">IT Portfolio Management</p>
</div>
</header>
<!-- Form Section -->
<section class="p-8">
<form class="space-y-5" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-wider" for="email">
                        Enterprise Email
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-sm">alternate_email</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface-container-lowest border border-outline-variant rounded-lg text-sm text-on-surface placeholder-outline focus:ring-1 focus:ring-secondary focus:border-secondary transition-all" id="email" name="email" placeholder="architect@enterprise.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-wider" for="password">
                            Access Key
                        </label>
<a class="text-[11px] font-semibold text-secondary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-sm">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface-container-lowest border border-outline-variant rounded-lg text-sm text-on-surface placeholder-outline focus:ring-1 focus:ring-secondary focus:border-secondary transition-all" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me (Utility Style) -->
<div class="flex items-center">
<input class="h-4 w-4 text-secondary focus:ring-secondary border-outline-variant rounded-sm" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-xs text-on-surface-variant" for="remember-me">
                        Trust this device for 30 days
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg text-sm font-bold text-white bg-secondary hover:bg-secondary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-secondary transition-all uppercase tracking-widest" type="submit">
                    Sign in
                    <span class="material-symbols-outlined ml-2 text-sm">login</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-[10px] uppercase font-bold tracking-widest">
<span class="px-2 bg-white text-outline">Compliance Protocols</span>
</div>
</div>
<!-- SSO Option -->
<div class="text-center">
<button class="w-full group flex items-center justify-center space-x-3 py-2.5 px-4 bg-surface-container border border-outline-variant rounded-lg hover:bg-surface-container-high transition-all" type="button">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-secondary">passkey</span>
<span class="text-xs font-bold text-on-surface uppercase tracking-wider">Sign in with SSO</span>
</button>
</div>
</section>
<!-- Footer -->
<footer class="px-8 pb-8 text-center">
<p class="text-[10px] text-outline leading-relaxed max-w-[280px] mx-auto uppercase tracking-tighter">
                Access restricted to authorized enterprise personnel. All activity is logged and audited in compliance with security standard ISO-27001.
            </p>
</footer>
</main>
<!-- Micro-interaction script -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#006591';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#75777e';
            });
        });
    </script>
</body></html>
