services:
  postgres:
    image: postgres:16
    container_name: ea-tool-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ea_tool
      POSTGRES_USER: ea_tool
      POSTGRES_PASSWORD: ea_tool
    ports:
      - "5432:5432"
    volumes:
      - ea-tool-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ea_tool -d ea_tool"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: ea-tool-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  ea-tool-postgres-data:
