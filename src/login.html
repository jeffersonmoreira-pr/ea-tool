<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in · Application Portfolio</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #0f172a;
      }
      .card {
        width: 100%;
        max-width: 380px;
        background: #ffffff;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 10px 40px rgba(15, 23, 42, 0.35);
      }
      .brand { font-weight: 700; letter-spacing: 0.02em; margin: 0 0 0.25rem; }
      .subtitle { color: #64748b; font-size: 0.9rem; margin: 0 0 1.5rem; }
      label { display: block; font-size: 0.8rem; font-weight: 600; margin: 0 0 0.35rem; color: #334155; }
      input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 0.95rem;
        margin-bottom: 1rem;
      }
      button.primary {
        width: 100%;
        padding: 0.65rem;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
      }
      button.primary:hover { background: #1d4ed8; }
      .divider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: #94a3b8;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin: 1.25rem 0;
      }
      .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; }
      a.sso {
        display: block;
        text-align: center;
        padding: 0.65rem;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        color: #1e293b;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
      }
      a.sso:hover { background: #f1f5f9; }
      .error {
        background: #fef2f2;
        color: #b91c1c;
        border: 1px solid #fecaca;
        border-radius: 8px;
        padding: 0.6rem 0.75rem;
        font-size: 0.85rem;
        margin-bottom: 1rem;
      }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <main class="card" aria-label="Sign in">
      <h1 class="brand">Application Portfolio</h1>
      <p class="subtitle">Sign in to continue</p>

      <div id="error" class="error hidden" role="alert">Invalid email or password.</div>

      <form method="post" action="/login" aria-label="Local login">
        <input type="hidden" name="_csrf" id="csrf" value="">
        <label for="username">Email</label>
        <input type="email" id="username" name="username" autocomplete="username" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <button type="submit" class="primary">Sign in</button>
      </form>

      <div class="divider">or</div>

      <a class="sso" href="/oauth2/authorization/keycloak">Sign in with SSO</a>
    </main>

    <script>
      (function () {
        function readCookie(name) {
          var match = document.cookie.match(new RegExp("(?:^|; )" + name + "=([^;]*)"));
          return match ? decodeURIComponent(match[1]) : "";
        }
        document.getElementById("csrf").value = readCookie("XSRF-TOKEN");
        if (window.location.search.indexOf("error") !== -1) {
          document.getElementById("error").classList.remove("hidden");
        }
      })();
    </script>
  </body>
</html>
