<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Set your password · Application Portfolio</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #0f172a;
      }
      .card {
        width: 100%;
        max-width: 380px;
        background: #ffffff;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 10px 40px rgba(15, 23, 42, 0.35);
      }
      .brand { font-weight: 700; margin: 0 0 0.25rem; }
      .subtitle { color: #64748b; font-size: 0.9rem; margin: 0 0 1.5rem; }
      label { display: block; font-size: 0.8rem; font-weight: 600; margin: 0 0 0.35rem; color: #334155; }
      input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 0.95rem;
        margin-bottom: 1rem;
      }
      button.primary {
        width: 100%;
        padding: 0.65rem;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
      }
      button.primary:disabled { opacity: 0.6; cursor: default; }
      .message { border-radius: 8px; padding: 0.6rem 0.75rem; font-size: 0.85rem; margin-bottom: 1rem; }
      .error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
      .success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
      a.link { color: #2563eb; font-weight: 600; text-decoration: none; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <main class="card" aria-label="Set your password">
      <h1 class="brand">Application Portfolio</h1>
      <p class="subtitle">Set your password to activate your account</p>

      <div id="message" class="message hidden" role="alert"></div>

      <form id="form" class="hidden" aria-label="Set password">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" readonly>
        <label for="password">New password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required>
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" autocomplete="new-password" minlength="8" required>
        <button type="submit" class="primary">Set password</button>
      </form>
    </main>

    <script>
      (function () {
        function readCookie(name) {
          var match = document.cookie.match(new RegExp("(?:^|; )" + name + "=([^;]*)"));
          return match ? decodeURIComponent(match[1]) : "";
        }
        function param(name) {
          var match = new RegExp("[?&]" + name + "=([^&]*)").exec(window.location.search);
          return match ? decodeURIComponent(match[1].replace(/\+/g, " ")) : "";
        }
        function showMessage(text, kind) {
          var el = document.getElementById("message");
          el.textContent = text;
          el.className = "message " + kind;
        }

        var token = param("token");
        var form = document.getElementById("form");
        var emailInput = document.getElementById("email");
        var passwordInput = document.getElementById("password");
        var confirmInput = document.getElementById("confirm");

        if (!token) {
          showMessage("This link is missing its invitation token.", "error");
          return;
        }

        fetch("/api/local-login/invitations/" + encodeURIComponent(token), {
          headers: { Accept: "application/json" },
        })
          .then(function (response) {
            if (!response.ok) {
              return response.json().catch(function () { return null; }).then(function (body) {
                throw new Error(body && body.message ? body.message : "This invitation link is invalid or has expired.");
              });
            }
            return response.json();
          })
          .then(function (details) {
            emailInput.value = details.email || "";
            form.classList.remove("hidden");
          })
          .catch(function (error) {
            showMessage(error.message, "error");
          });

        form.addEventListener("submit", function (event) {
          event.preventDefault();
          if (passwordInput.value !== confirmInput.value) {
            showMessage("The passwords do not match.", "error");
            return;
          }
          var submit = form.querySelector("button");
          submit.disabled = true;
          fetch("/api/local-login/set-password", {
            method: "POST",
            credentials: "include",
            headers: {
              "Content-Type": "application/json",
              "X-XSRF-TOKEN": readCookie("XSRF-TOKEN"),
            },
            body: JSON.stringify({ token: token, password: passwordInput.value }),
          })
            .then(function (response) {
              if (response.status === 204) {
                form.classList.add("hidden");
                var el = document.getElementById("message");
                el.className = "message success";
                el.innerHTML = 'Your password is set. <a class="link" href="/login.html">Sign in</a>.';
                return;
              }
              return response.json().catch(function () { return null; }).then(function (body) {
                throw new Error(body && body.message ? body.message : "Could not set your password.");
              });
            })
            .catch(function (error) {
              showMessage(error.message, "error");
              submit.disabled = false;
            });
        });
      })();
    </script>
  </body>
</html>
